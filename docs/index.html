<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>練團表</title>

<style>
body {
  font-family: Arial;
}

input {
  margin: 5px;
}

table {
  border-collapse: collapse;
  width: 100%;
  table-layout: fixed;
}

th, td {
  border: 1px solid #ccc;
  text-align: center;
  height: 35px;
  cursor: pointer;
}

th {
  background: #eee;
}

.selected {
  outline: 3px solid orange;
}

/* 人數顏色 */
.l1 { background: #b3e5fc; }
.l2 { background: #4fc3f7; }
.l3 { background: #0288d1; color: white; }
.l4 { background: #01579b; color: white; }
</style>
</head>

<body>

<h2>🎸 練團時間表</h2>

團名：
<input id="groupInput" placeholder="輸入團名">

名字（限1字）：
<input id="nameInput" maxlength="1">

<button onclick="setInfo()">設定</button>
<button onclick="submitData()">送出同步</button>

<p id="info"></p>

<table id="table"></table>

<script>
let userName = "";
let groupName = "";
let tempSelect = {};
let db = {};

// Firebase
const base = "https://rehearse0606-default-rtdb.firebaseio.com/";

function getGroup() {
  const url = new URL(window.location.href);
  return url.searchParams.get("group") || "default";
}

groupName = getGroup();

// 初始化
loadData();

function setInfo() {
  userName = document.getElementById("nameInput").value;
  groupName = document.getElementById("groupInput").value || groupName;

  document.getElementById("info").innerText =
    "團：" + groupName + " / 名字：" + userName;
}

// 時間表
let table = document.getElementById("table");

let hours = [];
for (let i = 5; i < 29; i++) hours.push(i % 24);

// header
let head = "<tr><th>時間</th>";
for (let d = 0; d < 7; d++) head += "<th>Day" + (d+1) + "</th>";
head += "</tr>";
table.innerHTML += head;

// body
for (let h = 0; h < hours.length; h++) {
  let tr = "<tr>";

  tr += "<td>" + hours[h] + ":00</td>";

  for (let d = 0; d < 7; d++) {
    let id = d + "-" + h;
    tr += `<td onclick="selectCell('${id}', this)"></td>`;
  }

  tr += "</tr>";
  table.innerHTML += tr;
}

// 選擇（本地）
function selectCell(id, el) {
  if (!userName) return alert("先輸入名字");

  if (!tempSelect[id]) tempSelect[id] = [];

  let i = tempSelect[id].indexOf(userName);

  if (i === -1) {
    tempSelect[id].push(userName);
  } else {
    tempSelect[id].splice(i, 1);
  }

  updateCell(id, el, tempSelect[id]);
}

// 更新顯示
function updateCell(id, el, arr) {
  if (!arr) arr = [];

  el.innerText = arr.join("/");

  el.className = "";

  let c = arr.length;
  if (c == 1) el.classList.add("l1");
  else if (c == 2) el.classList.add("l2");
  else if (c == 3) el.classList.add("l3");
  else if (c >= 4) el.classList.add("l4");
}

// 送出 Firebase
function submitData() {
  let url = base + groupName + ".json";

  fetch(url, {
    method: "PUT",
    body: JSON.stringify(tempSelect)
  });

  alert("已送出！");
}

// 讀資料
function loadData() {
  let url = base + groupName + ".json";

  fetch(url)
    .then(res => res.json())
    .then(data => {
      if (data) db = data;

      for (let key in db) {
        let el = document.querySelectorAll("td")[0];

        let cell = document.querySelector(`td[onclick="selectCell('${key}', this)"]`);

        if (cell) updateCell(key, cell, db[key]);
      }
    });
}
</script>

</body>
</html>
