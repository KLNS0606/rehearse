<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>練團系統</title>

<style>
body{font-family:Arial;margin:0;}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#eee;
}

.container{padding:10px;}

button,input{margin:5px;}

.card{
  padding:10px;
  border:1px solid #ccc;
  margin:5px 0;
  display:flex;
  justify-content:space-between;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

td,th{
  border:1px solid #ccc;
  text-align:center;
  height:35px;
  cursor:pointer;
}

.l1{background:#b3e5fc;}
.l2{background:#4fc3f7;}
.l3{background:#0288d1;color:white;}
.l4{background:#01579b;color:white;}

.hidden{display:none;}
</style>
</head>

<body>

<div class="topbar">
  <div id="title">🎸 練團系統</div>

  <div id="groupTools" class="hidden">
    👥 <span id="members"></span>
    <button onclick="copyLink()">📋 複製連結</button>
  </div>
</div>

<div class="container">

<!-- 首頁 -->
<div id="home">

  <h3>建立新團</h3>

  <input id="newGroupName" placeholder="輸入團名（英文）">
  <button onclick="createGroup()">建立</button>

  <h3>已建立的團</h3>
  <div id="groupList"></div>

</div>

<!-- 團內 -->
<div id="groupPage" class="hidden">

  <h3 id="groupTitle"></h3>

  名字（1字）：
  <input id="nameInput" maxlength="1">
  <button onclick="setName()">設定</button>
  <button onclick="submitData()">送出</button>

  <table id="table"></table>

</div>

</div>

<script>

const base = "https://rehearse0606-default-rtdb.firebaseio.com/";

let group = getGroup();
let userName = "";
let temp = {};

// ===== 判斷模式 =====
if(group){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("groupPage").classList.remove("hidden");
  document.getElementById("groupTools").classList.remove("hidden");
  document.getElementById("groupTitle").innerText = "團：" + group;
  load();
} else {
  loadGroupList();
}

// ===== 取得 group =====
function getGroup(){
  return new URL(location.href).searchParams.get("group");
}

// ===== 創團 =====
function createGroup(){
  let name = document.getElementById("newGroupName").value;
  if(!name) return;

  let list = JSON.parse(localStorage.getItem("groups")||"[]");
  if(!list.includes(name)) list.push(name);
  localStorage.setItem("groups", JSON.stringify(list));

  location.href = "?group=" + name;
}

// ===== 團列表 =====
function loadGroupList(){
  let list = JSON.parse(localStorage.getItem("groups")||"[]");
  let box = document.getElementById("groupList");

  box.innerHTML = "";

  list.forEach(g=>{
    let div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <span onclick="openGroup('${g}')">${g}</span>
      <button onclick="deleteGroup('${g}')">刪除</button>
    `;

    box.appendChild(div);
  });
}

function openGroup(g){
  location.href = "?group=" + g;
}

function deleteGroup(g){
  let list = JSON.parse(localStorage.getItem("groups")||"[]");
  list = list.filter(x=>x!==g);
  localStorage.setItem("groups", JSON.stringify(list));

  fetch(base + g + ".json",{method:"DELETE"});

  loadGroupList();
}

// ===== 複製連結 =====
function copyLink(){
  navigator.clipboard.writeText(location.href);
  alert("已複製");
}

// ===== 名字 =====
function setName(){
  userName = document.getElementById("nameInput").value;
}

// ===== 建表 =====
let table = document.getElementById("table");

let hours=[];
for(let i=5;i<29;i++)hours.push(i%24);

let h="<tr><th>時間</th>";
for(let d=0;d<7;d++)h+="<th>Day"+(d+1)+"</th>";
h+="</tr>";
table.innerHTML+=h;

for(let i=0;i<hours.length;i++){
  let tr="<tr>";
  tr+="<td>"+hours[i]+":00</td>";

  for(let d=0;d<7;d++){
    let id=d+"-"+i;
    tr+=`<td onclick="toggle('${id}',this)"></td>`;
  }

  tr+="</tr>";
  table.innerHTML+=tr;
}

// ===== 點格 =====
function toggle(id,el){
  if(!userName) return alert("先輸入名字");

  if(!temp[id]) temp[id]=[];

  let i=temp[id].indexOf(userName);

  if(i===-1) temp[id].push(userName);
  else temp[id].splice(i,1);

  render(id,el,temp[id]);
}

// ===== 顯示 =====
function render(id,el,arr){
  el.innerText=arr.join("/");

  el.className="";
  let c=arr.length;
  if(c==1)el.classList.add("l1");
  else if(c==2)el.classList.add("l2");
  else if(c==3)el.classList.add("l3");
  else if(c>=4)el.classList.add("l4");
}

// ===== 送出 =====
function submitData(){
  fetch(base + group + ".json",{
    method:"PUT",
    body:JSON.stringify(temp)
  });

  alert("已送出");
}

// ===== 載入 =====
function load(){
  fetch(base + group + ".json")
  .then(r=>r.json())
  .then(d=>{
    if(!d) return;
    temp=d;

    for(let k in temp){
      let cell=document.querySelector(`td[onclick="toggle('${k}',this)"]`);
      if(cell) render(k,cell,temp[k]);
    }

    // 成員顯示
    let names=new Set();
    for(let k in temp){
      temp[k].forEach(n=>names.add(n));
    }
    document.getElementById("members").innerText=[...names].join("/");
  });
}

</script>

</body>
</html>
