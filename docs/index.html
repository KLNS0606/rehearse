<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>練團時間表</title>
    
    <meta property="og:title" content="練團時間表">
    <meta property="og:description" content="練團時間統計表">

    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #fcfcfc; }
        .topbar { display: flex; justify-content: space-between; padding: 10px 15px; background: #eee; align-items: center; border-bottom: 1px solid #ddd; }
        #mainLogo { font-weight: bold; }
        .container { padding: 15px; }
        .row { display: grid; grid-template-columns: 60px 80px 120px 1fr 60px; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; align-items: center; font-size: 14px; background: white; }
        .url-text { color: blue; text-decoration: underline; word-break: break-all; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        td, th { border: 1px solid #e0e0e0; text-align: center; height: 35px; cursor: pointer; font-size: 14px; }
        th { background: #f5f5f5; width: 12%; }
        .l1 { background: #b3e5fc; } .l2 { background: #81d4fa; } .l3 { background: #4fc3f7; color: white; } .l4 { background: #0288d1; color: white; }
        .hidden { display: none; }
        button { cursor: pointer; padding: 5px 10px; border: 1px solid #ccc; border-radius: 4px; background: white; }
        input { padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="topbar">
    <div id="mainLogo">練團時間表</div>
    <div id="groupBar" class="hidden">
        👥 <span id="members">載入中...</span>
        <button onclick="copyRawLink(location.href)">複製連結</button>
    </div>
</div>

<div class="container">
    <div id="home">
        <h3>建立新團</h3>
        ID：<input id="groupId"> 團名：<input id="groupName"> 日期：<input type="date" id="start">
        <button onclick="createGroup()" style="background: #e0f7fa;">建立</button>
        <div id="list" style="margin-top:20px;"></div>
    </div>

    <div id="page" class="hidden">
        <h2 id="title">載入中...</h2>
        <div style="margin-bottom: 10px;">👥 目前已確認成員：<span id="membersText">無</span></div>
        <div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:15px;">
            您的名字(1字)：<input id="userName" maxlength="1" style="width:40px; text-align:center;">
            <button onclick="submitData()" style="background:#4caf50; color:white; border:none; padding: 6px 15px;">確定並送出</button>
        </div>
        <table id="table"></table>
    </div>
</div>

<script>
const base = "https://rehearse0606-default-rtdb.firebaseio.com/";
let currentGroupId = new URL(location.href).searchParams.get("group");
let tempData = {}, metaData = {};

// 找週一邏輯
function getMonday(d) {
    d = new Date(d);
    let day = d.getDay(), diff = d.getDate() - day + (day === 0 ? -6 : 1);
    return new Date(d.setDate(diff));
}

window.onload = () => {
    if (currentGroupId) {
        document.getElementById("home").classList.add("hidden");
        document.getElementById("page").classList.remove("hidden");
        document.getElementById("groupBar").classList.remove("hidden");
        loadGroupData();
    } else { loadLocalList(); }
};

async function createGroup() {
    const id = document.getElementById("groupId").value.trim(), name = document.getElementById("groupName").value.trim(), startInput = document.getElementById("start").value;
    if (!id || !name || !startInput) return alert("填寫完整！");
    
    try {
        const checkRes = await fetch(`${base}${id}/meta.json`);
        if (await checkRes.json()) return alert("編號已存在");

        const monday = getMonday(startInput);
        const meta = { name: name, start: monday.toISOString() };
        await fetch(`${base}${id}/meta.json`, { method: "PUT", body: JSON.stringify(meta) });
        
        let list = JSON.parse(localStorage.getItem("groups") || "[]");
        list.push({ id, name });
        localStorage.setItem("groups", JSON.stringify(list));
        location.href = `?group=${id}`;
    } catch (e) { alert("建立失敗"); }
}

function loadLocalList() {
    let list = JSON.parse(localStorage.getItem("groups") || "[]"), box = document.getElementById("list");
    box.innerHTML = "";
    list.forEach(g => {
        let url = `${location.origin}${location.pathname}?group=${g.id}`;
        let div = document.createElement("div"); div.className = "row";
        div.innerHTML = `<button onclick="copyRawLink('${url}')">複製</button><strong>${g.id}</strong><span>${g.name}</span><div class="url-text" onclick="location.href='${url}'">${url}</div><button onclick="deleteFullGroup('${g.id}')">刪</button>`;
        box.appendChild(div);
    });
}

async function deleteFullGroup(id) {
    if(!confirm("確定刪除？")) return;
    try {
        await fetch(`${base}${id}.json`, { method: "DELETE" });
        await fetch(`${base}${id}/meta.json`, { method: "DELETE" });
        let list = JSON.parse(localStorage.getItem("groups") || "[]").filter(x => x.id !== id);
        localStorage.setItem("groups", JSON.stringify(list));
        loadLocalList();
    } catch (e) { alert("刪除失敗"); }
}

async function loadGroupData() {
    try {
        const resMeta = await fetch(`${base}${currentGroupId}/meta.json`);
        metaData = await resMeta.json();
        if (!metaData) { document.getElementById("title").innerText = "找不到資料"; return; }

        let dStart = new Date(metaData.start), dEnd = new Date(metaData.start);
        dEnd.setDate(dStart.getDate() + 6);
        let range = `${dStart.getMonth()+1}/${dStart.getDate()}-${dEnd.getMonth()+1}/${dEnd.getDate()}`;
        
        const fullTitle = `${metaData.name} ${range}-練團時間表`;
        document.getElementById("title").innerText = metaData.name;
        document.getElementById("mainLogo").innerText = fullTitle;
        document.title = fullTitle;

        renderTableStructure();
        const resData = await fetch(`${base}${currentGroupId}/data.json`);
        const data = await resData.json();
        if (data) { tempData = data; refreshUI(true); }
    } catch (e) { document.getElementById("title").innerText = "連線失敗"; }
}

function renderTableStructure() {
    const table = document.getElementById("table"); table.innerHTML = "";
    let start = new Date(metaData.start), h = "<tr><th>時間</th>";
    const weeks = ["一", "二", "三", "四", "五", "六", "日"];
    for (let i = 0; i < 7; i++) {
        let d = new Date(start); d.setDate(start.getDate() + i);
        h += `<th>${d.getMonth()+1}/${d.getDate()}(${weeks[i]})</th>`;
    }
    table.innerHTML = h + "</tr>";

    for (let i = 5; i < 29; i++) {
        let tr = document.createElement("tr"), hr = i % 24;
        tr.innerHTML = `<td style="background:#fcfcfc; font-weight:bold; color:#777;">${hr}:00</td>`;
        for (let d = 0; d < 7; d++) {
            let cellId = `${d}-${i-5}`, td = document.createElement("td");
            td.dataset.id = cellId; td.onclick = () => toggleCell(cellId);
            tr.appendChild(td);
        }
        table.appendChild(tr);
    }
}

function toggleCell(id) {
    let name = document.getElementById("userName").value.trim();
    if (!name) return alert("請輸入名字！");
    if (!tempData[id]) tempData[id] = [];
    let idx = tempData[id].indexOf(name);
    if (idx === -1) tempData[id].push(name); else tempData[id].splice(idx, 1);
    refreshUI(false);
}

function refreshUI(updText) {
    let members = new Set();
    document.querySelectorAll("#table td[data-id]").forEach(td => {
        let users = tempData[td.dataset.id] || [];
        td.innerText = users.join("/"); td.className = "";
        if (users.length > 0) {
            td.classList.add("l" + Math.min(users.length, 4));
            users.forEach(u => members.add(u));
        }
    });
    if (updText) {
        let str = [...members].join(", ") || "無";
        document.getElementById("members").innerText = str;
        document.getElementById("membersText").innerText = str;
    }
}

async function submitData() {
    if (!document.getElementById("userName").value.trim()) return alert("請輸入名字！");
    try {
        await fetch(`${base}${currentGroupId}/data.json`, { method: "PUT", body: JSON.stringify(tempData) });
        alert("送出成功！"); refreshUI(true);
    } catch (e) { alert("儲存失敗"); }
}

function copyRawLink(url) { navigator.clipboard.writeText(url); alert("已複製連結"); }
</script>
</body>
</html>
