<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>練團系統</title>

<style>
body { font-family: Arial; }

.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#f2f2f2;
}

button,input{ margin:5px; }

table {
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

td,th{
  border:1px solid #ccc;
  text-align:center;
  height:35px;
  cursor:pointer;
}

.l1{background:#b3e5fc;}
.l2{background:#4fc3f7;}
.l3{background:#0288d1;color:white;}
.l4{background:#01579b;color:white;}
</style>
</head>

<body>

<div class="topbar">
  <div>🎸 團：<span id="groupName"></span></div>
  <div>
    <button onclick="createGroup()">➕ 創建新團</button>
    <button onclick="copyLink()">📋 複製連結</button>
  </div>
</div>

名字（1字）：
<input id="nameInput" maxlength="1">
<button onclick="setName()">設定</button>
<button onclick="submitData()">送出</button>

<p id="info"></p>

<table id="table"></table>

<script>

const base = "https://rehearse0606-default-rtdb.firebaseio.com/";

let userName = "";
let group = getGroup();
let temp = {};

document.getElementById("groupName").innerText = group;

// 取得 group
function getGroup(){
  let url = new URL(window.location.href);
  return url.searchParams.get("group") || "default";
}

// 創團
function createGroup(){
  let name = prompt("輸入團名（英文/數字）");
  if(!name) return;

  let link = window.location.origin + window.location.pathname + "?group=" + name;

  navigator.clipboard.writeText(link);
  alert("已複製連結：\n" + link);

  window.location.href = link;
}

// 複製連結
function copyLink(){
  navigator.clipboard.writeText(window.location.href);
  alert("已複製連結");
}

// 設名字
function setName(){
  userName = document.getElementById("nameInput").value;
  document.getElementById("info").innerText = "名字：" + userName;
}

// 建表
let table = document.getElementById("table");

let hours=[];
for(let i=5;i<29;i++)hours.push(i%24);

// header
let h="<tr><th>時間</th>";
for(let d=0;d<7;d++)h+="<th>Day"+(d+1)+"</th>";
h+="</tr>";
table.innerHTML+=h;

// body
for(let i=0;i<hours.length;i++){
  let tr="<tr>";
  tr+="<td>"+hours[i]+":00</td>";

  for(let d=0;d<7;d++){
    let id=d+"-"+i;
    tr+=`<td onclick="toggle('${id}',this)"></td>`;
  }

  tr+="</tr>";
  table.innerHTML+=tr;
}

// 點格
function toggle(id,el){
  if(!userName) return alert("先輸入名字");

  if(!temp[id]) temp[id]=[];

  let idx=temp[id].indexOf(userName);

  if(idx===-1) temp[id].push(userName);
  else temp[id].splice(idx,1);

  render(id,el,temp[id]);
}

// 顯示
function render(id,el,arr){
  el.innerText=arr.join("/");

  let c=arr.length;
  el.className="";
  if(c==1)el.classList.add("l1");
  else if(c==2)el.classList.add("l2");
  else if(c==3)el.classList.add("l3");
  else if(c>=4)el.classList.add("l4");
}

// 送出 Firebase（修正版）
function submitData(){
  let url = base + group + ".json";

  fetch(url,{
    method:"PUT",
    body:JSON.stringify(temp)
  })
  .then(r=>r.text())
  .then(()=>{
    alert("送出成功");
  })
  .catch(err=>{
    alert("送出失敗");
    console.log(err);
  });
}

// 讀取 Firebase（修正版）
function load(){
  let url = base + group + ".json";

  fetch(url)
  .then(res=>res.json())
  .then(data=>{
    if(!data) return;

    temp = data;

    for(let key in temp){
      let cell=document.querySelector(`td[onclick="toggle('${key}',this)"]`);
      if(cell) render(key,cell,temp[key]);
    }
  });
}

load();

</script>

</body>
</html>
