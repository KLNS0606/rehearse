<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>練團系統</title>

<style>
body{font-family:Arial;margin:0;}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#eee;
}

.container{padding:10px;}

button,input{margin:5px;}

.card{
  padding:10px;
  border:1px solid #ccc;
  margin:5px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

td,th{
  border:1px solid #ccc;
  text-align:center;
  height:35px;
  cursor:pointer;
}

.l1{background:#b3e5fc;}
.l2{background:#4fc3f7;}
.l3{background:#0288d1;color:white;}
.l4{background:#01579b;color:white;}

.hidden{display:none;}
</style>
</head>

<body>

<div class="topbar">
  <div>🎸 練團系統</div>

  <div id="groupBar" class="hidden">
    👥 <span id="members"></span>
    <button onclick="copyLink()">複製連結</button>
  </div>
</div>

<div class="container">

<!-- 🟢 首頁 -->
<div id="home">

  <h3>建立新團</h3>

  <input id="newGroup" placeholder="輸入團名">
  <button onclick="createGroup()">建立</button>

  <h3>目前的團</h3>
  <div id="groupList"></div>

</div>

<!-- 🔵 團內 -->
<div id="groupPage" class="hidden">

  <h3 id="groupTitle"></h3>

  📅 起始日期：
  <input type="date" id="startDate" onchange="buildTable()">

  <br>

  名字：
  <input id="name" maxlength="1">
  <button onclick="setName()">設定</button>
  <button onclick="submit()">送出</button>

  <table id="table"></table>

</div>

</div>

<script>

const base = "https://rehearse0606-default-rtdb.firebaseio.com/";

let group = getGroup();
let user = "";
let temp = {};
let startDate = null;

// ================= 判斷模式 =================
if(group){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("groupPage").classList.remove("hidden");
  document.getElementById("groupBar").classList.remove("hidden");
  document.getElementById("groupTitle").innerText = "團：" + group;
  load();
}else{
  loadGroups();
}

// ================= group =================
function getGroup(){
  return new URL(location.href).searchParams.get("group");
}

// ================= 建團 =================
function createGroup(){
  let name=document.getElementById("newGroup").value;
  if(!name)return;

  let list=JSON.parse(localStorage.getItem("groups")||"[]");

  if(!list.includes(name)){
    list.push(name);
  }

  localStorage.setItem("groups",JSON.stringify(list));

  location.href="?group="+name;
}

// ================= 刪團 =================
function deleteGroup(g){
  let list=JSON.parse(localStorage.getItem("groups")||"[]");
  list=list.filter(x=>x!==g);
  localStorage.setItem("groups",JSON.stringify(list));

  fetch(base+g+".json",{method:"DELETE"});
  loadGroups();
}

// ================= 列表 =================
function loadGroups(){
  let list=JSON.parse(localStorage.getItem("groups")||"[]");
  let box=document.getElementById("groupList");
  box.innerHTML="";

  list.forEach(g=>{
    let url=location.origin+location.pathname+"?group="+g;

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div>
        <div onclick="openGroup('${g}')">${g}</div>
        <small>${url}</small>
      </div>
      <button onclick="deleteGroup('${g}')">刪除</button>
    `;

    box.appendChild(div);
  });
}

// ================= 進團 =================
function openGroup(g){
  location.href="?group="+g;
}

// ================= 複製 =================
function copyLink(){
  navigator.clipboard.writeText(location.href);
  alert("已複製");
}

// ================= 名字 =================
function setName(){
  user=document.getElementById("name").value;
}

// ================= 日期 =================
function buildDates(){
  if(!startDate)return [];

  let d=new Date(startDate);
  let arr=[];

  for(let i=0;i<7;i++){
    let dd=new Date(d);
    dd.setDate(d.getDate()+i);

    let m=dd.getMonth()+1;
    let day=dd.getDate();

    let week=["日","一","二","三","四","五","六"][dd.getDay()];

    arr.push(`${m}/${day}(${week})`);
  }

  return arr;
}

// ================= 表格 =================
function buildTable(){
  startDate=document.getElementById("startDate").value;

  let table=document.getElementById("table");
  table.innerHTML="";

  let dates=buildDates();

  let hours=[];
  for(let i=5;i<29;i++)hours.push(i%24);

  let h="<tr><th>時間</th>";
  for(let i=0;i<7;i++)h+="<th>"+(dates[i]||("Day"+(i+1)))+"</th>";
  h+="</tr>";
  table.innerHTML+=h;

  for(let i=0;i<hours.length;i++){
    let tr="<tr>";
    tr+="<td>"+hours[i]+":00</td>";

    for(let d=0;d<7;d++){
      let id=d+"-"+i;
      tr+=`<td onclick="toggle('${id}',this)"></td>`;
    }

    tr+="</tr>";
    table.innerHTML+=tr;
  }
}

// ================= 點格 =================
function toggle(id,el){
  if(!user)return alert("先輸入名字");

  if(!temp[id])temp[id]=[];

  let i=temp[id].indexOf(user);

  if(i===-1)temp[id].push(user);
  else temp[id].splice(i,1);

  render(el,temp[id]);
}

// ================= 顯示 =================
function render(el,arr){
  el.innerText=arr.join("/");

  el.className="";
  let c=arr.length;

  if(c==1)el.classList.add("l1");
  else if(c==2)el.classList.add("l2");
  else if(c==3)el.classList.add("l3");
  else if(c>=4)el.classList.add("l4");
}

// ================= 送出 =================
function submit(){
  fetch(base+group+".json",{
    method:"PUT",
    body:JSON.stringify(temp)
  });

  alert("已送出");
}

// ================= 載入 =================
function load(){
  fetch(base+group+".json")
  .then(r=>r.json())
  .then(d=>{
    if(!d)return;
    temp=d;

    buildTable();

    for(let k in temp){
      let cell=document.querySelector(`td[onclick="toggle('${k}',this)"]`);
      if(cell)render(cell,temp[k]);
    }

    let set=new Set();
    for(let k in temp){
      temp[k].forEach(n=>set.add(n));
    }

    document.getElementById("members").innerText=[...set].join("/");
  });
}

</script>

</body>
</html>
