<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>練團時間表</title>

<style>
body {
  font-family: Arial;
}

table {
  border-collapse: collapse;
  width: 100%;
  table-layout: fixed;
}

th, td {
  border: 1px solid #ccc;
  text-align: center;
  height: 30px;
  cursor: pointer;
}

th {
  background: #f2f2f2;
}

/* 跨日區塊 */
.crossday {
  background: #eee;
}

/* 顏色深淺 */
.level1 { background: #b3e5fc; }
.level2 { background: #4fc3f7; }
.level3 { background: #0288d1; color: white; }
.level4 { background: #01579b; color: white; }

input {
  margin: 5px;
}
</style>
</head>

<body>

<h2>🎸 練團時間表</h2>

<!-- 輸入名字（限制1個字） -->
名字：
<input id="nameInput" maxlength="1" placeholder="只可一字">

<button onclick="saveName()">送出名字</button>

<br><br>

<button onclick="share()">📤 產生分享連結</button>

<p id="shareLink"></p>

<table id="schedule"></table>

<script>
let dbData = {}; // 暫存資料
let userName = "";

// Firebase（你的專案）
const firebaseURL = "https://rehearse0606-default-rtdb.firebaseio.com/schedule.json";

// 設名字（只能1字）
function saveName() {
  let name = document.getElementById("nameInput").value;
  if (!name) return alert("請輸入名字");
  userName = name[0];
  alert("已設定名字：" + userName);
}

// 產生表格（5:00 ~ 隔日5:00）
let table = document.getElementById("schedule");

let hours = [];
for (let i = 5; i < 29; i++) {
  hours.push(i % 24);
}

// 表頭
let header = "<tr><th>時間</th>";
for (let d = 0; d < 7; d++) {
  header += `<th>Day${d+1}</th>`;
}
header += "</tr>";
table.innerHTML += header;

// 表格
for (let h = 0; h < hours.length; h++) {
  let realHour = hours[h];

  let row = "<tr>";

  // 時間欄
  let label = realHour + ":00";
  if (realHour < 5) {
    row += `<td class="crossday">${label}</td>`;
  } else {
    row += `<td>${label}</td>`;
  }

  // 每天格子
  for (let d = 0; d < 7; d++) {
    let id = d + "-" + h;
    row += `<td onclick="toggle('${id}', this)"></td>`;
  }

  row += "</tr>";
  table.innerHTML += row;
}

// 點格子（多人累積）
function toggle(id, cell) {
  if (!userName) return alert("先輸入名字");

  if (!dbData[id]) dbData[id] = [];

  let index = dbData[id].indexOf(userName);

  if (index === -1) {
    dbData[id].push(userName);
  } else {
    dbData[id].splice(index, 1);
  }

  updateCell(id, cell);
  sendData();
}

// 更新顏色
function updateCell(id, cell) {
  let count = dbData[id] ? dbData[id].length : 0;

  cell.innerText = dbData[id] ? dbData[id].join("") : "";

  cell.className = "";

  if (count == 1) cell.classList.add("level1");
  else if (count == 2) cell.classList.add("level2");
  else if (count == 3) cell.classList.add("level3");
  else if (count >= 4) cell.classList.add("level4");
}

// 存到 Firebase（按一次才送出）
function sendData() {
  fetch(firebaseURL, {
    method: "PUT",
    body: JSON.stringify(dbData)
  });
}

// 分享連結
function share() {
  let url = window.location.href;
  document.getElementById("shareLink").innerText = url;
}
</script>

</body>
</html>
