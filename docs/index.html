<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>🎸 練團時間表</title>
    
    <meta property="og:description" content="練團時間統計表">
    <meta property="og:image" content="https://img.icons8.com/color/480/rock-music.png">

    <style>
        body { font-family: Arial, sans-serif; margin: 0; }
        .topbar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #eee;
            align-items: center;
        }
        .container { padding: 10px; }
        .row {
            display: grid;
            grid-template-columns: 60px 80px 120px 1fr 60px;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid #ddd;
            align-items: center;
            font-size: 14px;
        }
        .url-text { color: blue; text-decoration: underline; word-break: break-all; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td, th { border: 1px solid #ccc; text-align: center; height: 35px; cursor: pointer; }
        th { background: #f4f4f4; }
        .l1 { background: #b3e5fc; }
        .l2 { background: #4fc3f7; }
        .l3 { background: #0288d1; color: white; }
        .l4 { background: #01579b; color: white; }
        .hidden { display: none; }
        button { cursor: pointer; padding: 5px 8px; }
    </style>
</head>
<body>

<div class="topbar">
    <div id="mainLogo">🎸 練團時間表</div>
    <div id="groupBar" class="hidden">
        👥 <span id="members">載入中...</span>
        <button onclick="copyRawLink(location.href)">複製連結</button>
    </div>
</div>

<div class="container">
    <div id="home">
        <h3>建立新團</h3>
        ID：<input id="groupId"> 
        團名：<input id="groupName">
        日期：<input type="date" id="start">
        <button onclick="createGroup()">建立並進入</button>

        <h3>我的團隊列表</h3>
        <div id="list"></div>
    </div>

    <div id="page" class="hidden">
        <h2 id="title">載入中...</h2>
        <div style="margin-bottom: 15px;">
            👥 目前已確認成員：<span id="membersText">無</span>
        </div>
        
        <div style="background: #f9f9f9; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
            您的名字(限1字)：<input id="userName" placeholder="填1字" maxlength="1">
            <button onclick="submitData()" style="background: #4caf50; color: white; border: none; padding: 6px 15px;">確定並送出時間</button>
        </div>

        <table id="table"></table>
    </div>
</div>

<script>
const base = "https://rehearse0606-default-rtdb.firebaseio.com/";
let currentGroupId = new URL(location.href).searchParams.get("group");
let tempData = {}; 
let metaData = {};

window.onload = () => {
    if (currentGroupId) {
        document.getElementById("home").classList.add("hidden");
        document.getElementById("page").classList.remove("hidden");
        document.getElementById("groupBar").classList.remove("hidden");
        loadGroupData();
    } else {
        loadLocalList();
    }
};

async function createGroup() {
    const id = document.getElementById("groupId").value.trim();
    const name = document.getElementById("groupName").value.trim();
    const start = document.getElementById("start").value;
    if (!id || !name || !start) { alert("請填寫完整！"); return; }
    try {
        const checkRes = await fetch(`${base}${id}/meta.json`);
        const existingMeta = await checkRes.json();
        if (existingMeta) { alert(`編號 [${id}] 已存在！`); return; }
        const meta = { name: name, start: new Date(start).toISOString() };
        await fetch(`${base}${id}/meta.json`, { method: "PUT", body: JSON.stringify(meta) });
        let list = JSON.parse(localStorage.getItem("groups") || "[]");
        if (!list.find(g => g.id === id)) { list.push({ id, name }); localStorage.setItem("groups", JSON.stringify(list)); }
        location.href = `?group=${id}`;
    } catch (e) { alert("建立失敗"); }
}

function loadLocalList() {
    let list = JSON.parse(localStorage.getItem("groups") || "[]");
    let box = document.getElementById("list");
    box.innerHTML = list.length ? "" : "目前沒有記錄";
    list.forEach(g => {
        let url = `${location.origin}${location.pathname}?group=${g.id}`;
        let div = document.createElement("div");
        div.className = "row";
        div.innerHTML = `
            <button onclick="copyRawLink('${url}')">複製</button>
            <strong>${g.id}</strong>
            <span>${g.name}</span>
            <div class="url-text" onclick="location.href='${url}'">${url}</div>
            <button onclick="deleteFullGroup('${g.id}')">刪</button>
        `;
        box.appendChild(div);
    });
}

async function deleteFullGroup(id) {
    if(!confirm(`確定要永久刪除 [${id}] 嗎？`)) return;
    try {
        await fetch(`${base}${id}/data.json`, { method: "DELETE" });
        await fetch(`${base}${id}/meta.json`, { method: "DELETE" });
        let list = JSON.parse(localStorage.getItem("groups") || "[]").filter(x => x.id !== id);
        localStorage.setItem("groups", JSON.stringify(list));
        loadLocalList();
    } catch (e) { alert("刪除失敗"); }
}

async function loadGroupData() {
    try {
        const resMeta = await fetch(`${base}${currentGroupId}/meta.json`);
        metaData = await resMeta.json();
        if (!metaData) { document.getElementById("title").innerText = "找不到資料"; return; }

        let dStart = new Date(metaData.start);
        let dEnd = new Date(metaData.start);
        dEnd.setDate(dStart.getDate() + 6);
        let dateRange = `${dStart.getMonth() + 1}/${dStart.getDate()}-${dEnd.getMonth() + 1}/${dEnd.getDate()}`;
        
        // 核心顯示邏輯：
        const displayLabel = `${metaData.name} ${dateRange}-練團時間表`;
        
        document.getElementById("title").innerText = metaData.name; // 中間標題顯示團名
        document.getElementById("mainLogo").innerText = `🎸 ${displayLabel}`; // Topbar 顯示全名
        document.title = displayLabel; // 分頁標題同步更新 (有利於分享預覽)

        renderTableStructure();
        const resData = await fetch(`${base}${currentGroupId}/data.json`);
        const data = await resData.json();
        if (data) { tempData = data; refreshUI(true); }
    } catch (e) { document.getElementById("title").innerText = "連線失敗"; }
}

function renderTableStructure() {
    const table = document.getElementById("table");
    table.innerHTML = "";
    let start = new Date(metaData.start);
    let h = "<tr><th>時間</th>";
    for (let i = 0; i < 7; i++) {
        let d = new Date(start); d.setDate(start.getDate() + i);
        let week = ["日", "一", "二", "三", "四", "五", "六"][d.getDay()];
        h += `<th>${d.getMonth() + 1}/${d.getDate()}(${week})</th>`;
    }
    table.innerHTML = h + "</tr>";
    let hours = [];
    for (let i = 5; i < 29; i++) hours.push(i % 24);
    hours.forEach((h, idx) => {
        let tr = document.createElement("tr");
        tr.innerHTML = `<td>${h}:00</td>`;
        for (let d = 0; d < 7; d++) {
            let cellId = `${d}-${idx}`;
            let td = document.createElement("td");
            td.dataset.id = cellId;
            td.onclick = () => toggleCell(cellId);
            tr.appendChild(td);
        }
        table.appendChild(tr);
    });
}

function toggleCell(cellId) {
    let userName = document.getElementById("userName").value.trim();
    if (!userName) { alert("請先輸入名字！"); return; }
    if (!tempData[cellId]) tempData[cellId] = [];
    let index = tempData[cellId].indexOf(userName);
    if (index === -1) tempData[cellId].push(userName);
    else tempData[cellId].splice(index, 1);
    refreshUI(false); 
}

function refreshUI(updateMemberText) {
    let allMembers = new Set();
    document.querySelectorAll("#table td[data-id]").forEach(td => {
        let id = td.dataset.id;
        let users = tempData[id] || [];
        td.innerText = users.join("/");
        td.className = "";
        if (users.length > 0) {
            if (users.length === 1) td.classList.add("l1");
            else if (users.length === 2) td.classList.add("l2");
            else if (users.length === 3) td.classList.add("l3");
            else td.classList.add("l4");
            users.forEach(u => allMembers.add(u));
        }
    });
    if (updateMemberText) {
        let memberListStr = [...allMembers].join(", ") || "無";
        document.getElementById("members").innerText = memberListStr;
        document.getElementById("membersText").innerText = memberListStr;
    }
}

async function submitData() {
    let userName = document.getElementById("userName").value.trim();
    if (!userName) { alert("請輸入名字再送出"); return; }
    try {
        await fetch(`${base}${currentGroupId}/data.json`, { method: "PUT", body: JSON.stringify(tempData) });
        alert("送出成功！");
        refreshUI(true);
    } catch (e) { alert("儲存失敗"); }
}

function copyRawLink(url) {
    navigator.clipboard.writeText(url); // 只複製純網址
    alert("已複製連結");
}
</script>

</body>
</html>
