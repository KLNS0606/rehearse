<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>練團系統</title>

<style>
body{font-family:Arial;margin:0;}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#eee;
}

.container{padding:10px;}

.card{
  border:1px solid #ccc;
  margin:5px 0;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

td,th{
  border:1px solid #ccc;
  text-align:center;
  height:35px;
  cursor:pointer;
}

.l1{background:#b3e5fc;}
.l2{background:#4fc3f7;}
.l3{background:#0288d1;color:white;}
.l4{background:#01579b;color:white;}

.hidden{display:none;}
</style>
</head>

<body>

<div class="topbar">
  🎸 練團系統
  <div id="groupBar" class="hidden">
    👥 <span id="members"></span>
    <button onclick="copyLink()">複製連結</button>
  </div>
</div>

<div class="container">

<!-- 🟢 首頁 -->
<div id="home">

  <h3>建立新團</h3>

  <input id="groupName" placeholder="團名">

  <br>

  開始日期：
  <input type="date" id="start">

  結束日期：
  <input type="date" id="end">

  <button onclick="createGroup()">建立</button>

  <h3>已有團</h3>
  <div id="list"></div>

</div>

<!-- 🔵 團內 -->
<div id="page" class="hidden">

  <h3 id="title"></h3>

  週次：
  <select id="weekSelect" onchange="renderWeek()"></select>

  <br>

  名字：
  <input id="name" maxlength="1">
  <button onclick="setName()">設定</button>

  <button onclick="submit()">送出</button>

  <table id="table"></table>

</div>

</div>

<script>

const base="https://rehearse0606-default-rtdb.firebaseio.com/";

let group=getGroup();
let user="";
let temp={};
let meta={};
let currentWeek=0;

// ================= 判斷模式 =================
if(group){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("page").classList.remove("hidden");
  document.getElementById("groupBar").classList.remove("hidden");
  document.getElementById("title").innerText="團："+group;
  load();
}else{
  loadList();
}

// ================= group =================
function getGroup(){
  return new URL(location.href).searchParams.get("group");
}

// ================= 建團 =================
function createGroup(){

  let name=document.getElementById("groupName").value;
  let start=document.getElementById("start").value;
  let end=document.getElementById("end").value;

  if(!name||!start||!end)return;

  let list=JSON.parse(localStorage.getItem("groups")||"[]");

  list.push(name);
  localStorage.setItem("groups",JSON.stringify(list));

  fetch(base+name+".meta.json",{
    method:"PUT",
    body:JSON.stringify({start,end})
  });

  location.href="?group="+name;
}

// ================= 列表 =================
function loadList(){
  let list=JSON.parse(localStorage.getItem("groups")||"[]");
  let box=document.getElementById("list");

  box.innerHTML="";

  list.forEach(g=>{
    let url=location.origin+location.pathname+"?group="+g;

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div>
        <div onclick="openGroup('${g}')">${g}</div>
        <small>${url}</small>
      </div>
      <button onclick="deleteGroup('${g}')">刪除</button>
    `;

    box.appendChild(div);
  });
}

// ================= 刪團 =================
function deleteGroup(g){
  let list=JSON.parse(localStorage.getItem("groups")||"[]");
  list=list.filter(x=>x!==g);
  localStorage.setItem("groups",JSON.stringify(list));

  fetch(base+g+".json",{method:"DELETE"});
  fetch(base+g+".meta.json",{method:"DELETE"});

  loadList();
}

// ================= 進團 =================
function openGroup(g){
  location.href="?group="+g;
}

// ================= 複製 =================
function copyLink(){
  navigator.clipboard.writeText(location.href);
}

// ================= 名字 =================
function setName(){
  user=document.getElementById("name").value;
}

// ================= 讀資料 =================
function load(){

  fetch(base+group+".meta.json")
  .then(r=>r.json())
  .then(m=>{
    meta=m;
    buildWeeks();
  });

  fetch(base+group+".json")
  .then(r=>r.json())
  .then(d=>{
    if(d)temp=d;
  });

}

// ================= 週切割 =================
function buildWeeks(){

  let start=new Date(meta.start);
  let end=new Date(meta.end);

  let weeks=[];

  let cur=new Date(start);

  while(cur<=end){
    let s=new Date(cur);
    let e=new Date(cur);
    e.setDate(e.getDate()+6);

    weeks.push({s:new Date(s),e:new Date(e)});

    cur.setDate(cur.getDate()+7);
  }

  let sel=document.getElementById("weekSelect");
  sel.innerHTML="";

  weeks.forEach((w,i)=>{
    let opt=document.createElement("option");
    opt.value=i;
    opt.innerText=
      `${w.s.getMonth()+1}/${w.s.getDate()}~${w.e.getMonth()+1}/${w.e.getDate()}`;
    sel.appendChild(opt);
  });

  renderTable();
}

// ================= 表格 =================
function renderTable(){

  let table=document.getElementById("table");
  table.innerHTML="";

  let h="<tr><th>時間</th>";

  for(let d=0;d<7;d++){
    h+="<th>Day"+(d+1)+"</th>";
  }

  h+="</tr>";
  table.innerHTML+=h;

  let hours=[];
  for(let i=5;i<29;i++)hours.push(i%24);

  for(let i=0;i<hours.length;i++){
    let tr="<tr>";
    tr+="<td>"+hours[i]+":00</td>";

    for(let d=0;d<7;d++){
      let id=d+"-"+i;
      tr+=`<td onclick="toggle('${id}',this)"></td>`;
    }

    tr+="</tr>";
    table.innerHTML+=tr;
  }

  refresh();
}

// ================= 點 =================
function toggle(id,el){
  if(!user)return;

  if(!temp[id])temp[id]=[];

  let i=temp[id].indexOf(user);

  if(i===-1)temp[id].push(user);
  else temp[id].splice(i,1);

  renderCell(el,temp[id]);
}

// ================= 顯示 =================
function renderCell(el,arr){
  el.innerText=arr.join("/");

  el.className="";
  let c=arr.length;

  if(c==1)el.classList.add("l1");
  else if(c==2)el.classList.add("l2");
  else if(c==3)el.classList.add("l3");
  else if(c>=4)el.classList.add("l4");
}

// ================= 成員 + 還原 =================
function refresh(){

  let set=new Set();

  for(let k in temp){
    let el=document.querySelector(`td[onclick="toggle('${k}',this)"]`);
    if(el)renderCell(el,temp[k]);

    temp[k].forEach(n=>set.add(n));
  }

  document.getElementById("members").innerText=[...set].join("/");
}

// ================= 送出 =================
function submit(){
  fetch(base+group+".json",{
    method:"PUT",
    body:JSON.stringify(temp)
  });
}

</script>

</body>
</html>
