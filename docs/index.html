<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>練團時間表</title>

<style>
body{font-family:Arial;margin:0;}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#eee;
}

.container{padding:10px;}

input{margin:3px;}

.row{
  display:grid;
  grid-template-columns: 80px 1fr 2fr 60px;
  gap:10px;
  padding:8px;
  border-bottom:1px solid #ddd;
  align-items:center;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

td,th{
  border:1px solid #ccc;
  text-align:center;
  height:35px;
  cursor:pointer;
}

.l1{background:#b3e5fc;}
.l2{background:#4fc3f7;}
.l3{background:#0288d1;color:white;}
.l4{background:#01579b;color:white;}

.hidden{display:none;}
a{color:blue;}
</style>
</head>

<body>

<div class="topbar">
  🎸 練團時間表

  <div id="groupBar" class="hidden">
    👥 <span id="members"></span>
    <button onclick="copyLink()">複製連結</button>
  </div>
</div>

<div class="container">

<!-- 🟢 首頁 -->
<div id="home">

  <h3>建立新團</h3>

  ID：
  <input id="groupId">

  團名：
  <input id="groupName">

  <br>

  開始：
  <input type="date" id="start">

  結束：
  <input type="date" id="end">

  <button onclick="createGroup()">建立</button>

  <h3>目前團隊</h3>
  <div id="list"></div>

</div>

<!-- 🔵 團內 -->
<div id="page" class="hidden">

  <h2 id="title"></h2>

  👥 <span id="membersText"></span>

  <br><br>

  區間：
  <select id="weekSelect" onchange="renderTable()"></select>

  <br><br>

  名字：
  <input id="name" maxlength="1">
  <button onclick="setName()">設定</button>
  <button onclick="submit()">送出</button>

  <table id="table"></table>

</div>

</div>

<script>

const base="https://rehearse0606-default-rtdb.firebaseio.com/";

let groupId=getGroup();
let user="";
let temp={};
let meta={};
let weeks=[];

// ================= 判斷 =================
if(groupId){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("page").classList.remove("hidden");
  document.getElementById("groupBar").classList.remove("hidden");
  load();
}else{
  loadList();
}

// ================= group =================
function getGroup(){
  return new URL(location.href).searchParams.get("group");
}

// ================= 建團 =================
function createGroup(){

  let id=document.getElementById("groupId").value;
  let name=document.getElementById("groupName").value;
  let start=document.getElementById("start").value;
  let end=document.getElementById("end").value;

  if(!id||!name||!start||!end)return;

  let list=JSON.parse(localStorage.getItem("groups")||"[]");

  list.push({id,name});
  localStorage.setItem("groups",JSON.stringify(list));

  fetch(base+id+".meta.json",{
    method:"PUT",
    body:JSON.stringify({name,start,end})
  });

  location.href="?group="+id;
}

// ================= 列表 =================
function loadList(){

  let list=JSON.parse(localStorage.getItem("groups")||"[]");
  let box=document.getElementById("list");
  box.innerHTML="";

  list.forEach(g=>{

    let url=location.origin+location.pathname+"?group="+g.id;

    let div=document.createElement("div");
    div.className="row";

    div.innerHTML=`
      <div>${g.id}</div>
      <div>${g.name}</div>
      <div><a href="${url}">${url}</a></div>
      <button onclick="deleteGroup('${g.id}')">刪除</button>
    `;

    box.appendChild(div);
  });
}

// ================= 刪團 =================
function deleteGroup(id){

  let list=JSON.parse(localStorage.getItem("groups")||"[]");
  list=list.filter(x=>x.id!==id);
  localStorage.setItem("groups",JSON.stringify(list));

  fetch(base+id+".json",{method:"DELETE"});
  fetch(base+id+".meta.json",{method:"DELETE"});

  loadList();
}

// ================= 複製 =================
function copyLink(){
  navigator.clipboard.writeText(location.href);
}

// ================= 名字 =================
function setName(){
  user=document.getElementById("name").value;
}

// ================= 建週 =================
function buildWeeks(start,end){

  weeks=[];
  let cur=new Date(start);

  while(cur<=new Date(end)){

    let s=new Date(cur);
    let e=new Date(cur);
    e.setDate(e.getDate()+6);

    weeks.push({s,e});

    cur.setDate(cur.getDate()+7);
  }

  let sel=document.getElementById("weekSelect");
  sel.innerHTML="";

  weeks.forEach((w,i)=>{

    let opt=document.createElement("option");

    opt.value=i;

    opt.innerText=
      `${w.s.getMonth()+1}/${w.s.getDate()}(${getWeek(w.s)}) ~ ${w.e.getMonth()+1}/${w.e.getDate()}(${getWeek(w.e)})`;

    sel.appendChild(opt);
  });

  window.weeks=weeks;

  renderTable();
}

// ================= 星期 =================
function getWeek(d){
  return ["日","一","二","三","四","五","六"][d.getDay()];
}

// ================= 表格 =================
function renderTable(){

  let table=document.getElementById("table");
  table.innerHTML="";

  let h="<tr><th>時間</th>";

  for(let d=0;d<7;d++){
    h+="<th>Day"+(d+1)+"</th>";
  }

  h+="</tr>";
  table.innerHTML+=h;

  let hours=[];
  for(let i=5;i<29;i++)hours.push(i%24);

  for(let i=0;i<hours.length;i++){
    let tr="<tr>";
    tr+="<td>"+hours[i]+":00</td>";

    for(let d=0;d<7;d++){
      let id=d+"-"+i;
      tr+=`<td onclick="toggle('${id}',this)"></td>`;
    }

    tr+="</tr>";
    table.innerHTML+=tr;
  }

  refresh();
}

// ================= 點 =================
function toggle(id,el){

  if(!user)return;

  if(!temp[id])temp[id]=[];

  let i=temp[id].indexOf(user);

  if(i===-1)temp[id].push(user);
  else temp[id].splice(i,1);

  render(el,temp[id]);
}

// ================= 顯示 =================
function render(el,arr){

  el.innerText=arr.join("/");

  el.className="";
  let c=arr.length;

  if(c==1)el.classList.add("l1");
  else if(c==2)el.classList.add("l2");
  else if(c==3)el.classList.add("l3");
  else if(c>=4)el.classList.add("l4");
}

// ================= 成員 =================
function refresh(){

  let set=new Set();

  for(let k in temp){

    let el=document.querySelector(`td[onclick="toggle('${k}',this)"]`);
    if(el)render(el,temp[k]);

    temp[k].forEach(n=>set.add(n));
  }

  document.getElementById("members").innerText=[...set].join("/");
  document.getElementById("membersText").innerText=[...set].join("/");
}

// ================= 送出 =================
function submit(){
  fetch(base+groupId+".json",{
    method:"PUT",
    body:JSON.stringify(temp)
  });
}

// ================= 載入 =================
function load(){

  fetch(base+groupId+".meta.json")
  .then(r=>r.json())
  .then(m=>{
    meta=m;

    document.getElementById("title").innerText=m.name;

    buildWeeks(m.start,m.end);
  });

  fetch(base+groupId+".json")
  .then(r=>r.json())
  .then(d=>{
    if(d)temp=d;
  });
}

</script>

</body>
</html>
